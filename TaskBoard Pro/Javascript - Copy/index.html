<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TaskBoard Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
  <h1>TaskBoard Pro</h1>
  <button id="theme-btn">🌙</button>
  <div class="header-controls">
    <input type="text" id="searchInput" placeholder="Search tasks...">
    <select id="priorityFilter">
      <option value="all">All Priority</option>
      <option value="high">High 🔴</option>
      <option value="medium">Medium 🟡</option>
      <option value="low">Low 🟢</option>
    </select>
    <button id="addTaskBtn">+ Add Task</button>
  </div>
</header>

<main class="board">
  <div class="column" data-status="todo">
    <h2>To Do <span class="count">0</span></h2>
    <div class="task-list"></div>
  </div>

  <div class="column" data-status="progress">
    <h2>In Progress <span class="count">0</span></h2>
    <div class="task-list"></div>
  </div>

  <div class="column" data-status="done">
    <h2>Done <span class="count">0</span></h2>
    <div class="task-list"></div>
  </div>
</main>


<!-- Add Task Modal -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2>Add New Task</h2>
    <input type="text" id="taskInput" placeholder="Enter task title...">
    <input type="date" id="taskDate">
    <button id="saveTaskBtn">Save Task</button>
    <select id="taskPriority">
  <option value="medium">Medium</option>
  <option value="high">High</option>
  <option value="low">Low</option>
</select>
  </div>
</div>

<script src="first.js"></script>
</body>
</html>
